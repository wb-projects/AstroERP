[QUERY1]
header_text=A NAV kapcsolódási adatok lekérdezése
info_text=Ez a lekérdezés nem kötelező, akkor javasolt a használata, ha minden művelethez ugyanazokat a NAV kapcsolódási adatokat használjuk. Ha jelentésenként, számlánként eltérhetnek ezek a paraméterek, akkor javallott a paramétereket a számla fejléc lekérdezésben lekérdezni.
query_filename=query_nav_user_parameters.sql
parameter1=NAV_USERNAME - ⚠ Nav felhasználónév
parameter2=NAV_PASSWORD - ⚠ Nav jelszó
parameter3=NAV_XML_SIGNATURE_KEY - ⚠ Nav XML aláírókulcs
parameter4=NAV_XML_EXCHANGE_KEY - ⚠ Nav XML cserekulcs
parameter5=SOFTWARE_ID - ⚠ A számlázó szoftver egyedi azonosító kódja. Úgy kell kialakítani, hogy biztosan egyedi legyen. Például: országkód + a fejlesztő adószáma első 8 számjegye + a készítés éve YYYYMMDD formátumban (HU1234567820220517). Maximum 18 karakter lehet.
parameter6=SOFTWARE_NAME - ⚠ A számlázó szoftver neve.
parameter7=SOFTWARE_TYPE - ⚠ A számlázó szoftver típusa: ● LOCAL_SOFTWARE - Desktop/mobil hibrid alkalmazás ● ONLINE_SERVICE - Online számlázó
parameter8=SOFTWARE_MAINVERSION - ⚠ A számlázó szoftver főverziószáma.
parameter9=SOFTWARE_DEVELOPER_NAME - ⚠ A számlázó szoftver fejlesztőjének neve.
parameter10=SOFTWARE_DEVELOPER_CONTACT - ⚠ A számlázó szoftver fejlesztőjének elérhetősége (e-mail cím).


[QUERY2]
header_text=Jelentendő számlák listája
info_text=⚠ A jelentendő számlák listája lekérdezéssel az összes olyan számlát lekérdezzük, amelyek még nem voltak jelentve, vagy voltak már jelentve, de valamilyen okból visszautasításra kerültek.↓A lista elég, ha az ID-ket (primary key) listázza és ezeket a HEADER_ID mezőnévvel adja vissza.↓A számlák mindenképpen ID (vagy más primary key), vagy kiállításuk dátuma és ideje szerint legyenek növekvő sorrendbe állítva (ne kerüljön egy korábbi számla egy újabb elé a listában).
query_filename=query_invoice_list_to_report.sql
parameter1=HEADER_ID - ⚠ számla fejléc ID mező


[QUERY3]
header_text=Egy jelentendő számla fejléc adatai
info_text=⚠ Ezzel a lekérdezéssel egy számla fejléc adatait kérdezzük le. Szükség lesz a :HEADER_ID paraméterre (az összes számla lista lekérdezésből a HEADER_ID helyettesítődik be ide). A lekérdezésnek tartalmaznia kell a számla összesítéseket is (nettó, áfa és bruttó számla végösszeg).
query_filename=query_invoice_header.sql
parameter1=:HEADER_ID - ⚠ A számla fejléc ID paraméter (pl.: ... WHERE invoice.id=:HEADER_ID), értéke a számlák listájából jön a HEADER_ID mezőből.
parameter2=NAV_USERNAME - Nav felhasználónév (ha eseti jellegű és nem a külön lekérdezésben kérdezzük le)
parameter3=NAV_PASSWORD - Nav jelszó (ha eseti jellegű és nem a külön lekérdezésben kérdezzük le)
parameter4=NAV_XML_SIGNATURE_KEY - Nav XML aláírókulcs (ha eseti jellegű és nem a külön lekérdezésben kérdezzük le)
parameter5=NAV_XML_EXCHANGE_KEY - Nav XML cserekulcs (ha eseti jellegű és nem a külön lekérdezésben kérdezzük le)

parameter6=SOFTWARE_ID - A számlázó szoftver egyedi azonosító kódja. Úgy kell kialakítani, hogy biztosan egyedi legyen. Például: országkód + a fejlesztő adószáma első 8 számjegye + a készítés éve YYYYMMDD formátumban. Maximum 18 karakter lehet. ↓(Csak akkor kell megadni, ha a külön NAV kapcsolódási adatok lekérdezésénél nem kérdeztük le.) 
parameter7=SOFTWARE_NAME - A számlázó szoftver neve. ↓(Csak akkor kell megadni, ha a külön NAV kapcsolódási adatok lekérdezésénél nem kérdeztük le.)
parameter8=SOFTWARE_TYPE - A számlázó szoftver típusa: ● LOCAL_SOFTWARE - Desktop/mobil hibrid alkalmazás ● ONLINE_SERVICE - Online számlázó ↓(Csak akkor kell megadni, ha a külön NAV kapcsolódási adatok lekérdezésénél nem kérdeztük le.)
parameter9=SOFTWARE_MAINVERSION - A számlázó szoftver főverziószáma. ↓(Csak akkor kell megadni, ha a külön NAV kapcsolódási adatok lekérdezésénél nem kérdeztük le.)
parameter10=SOFTWARE_DEVELOPER_NAME - A számlázó szoftver fejlesztőjének neve. ↓(Csak akkor kell megadni, ha a külön NAV kapcsolódási adatok lekérdezésénél nem kérdeztük le.)
parameter11=SOFTWARE_DEVELOPER_CONTACT - A számlázó szoftver fejlesztőjének elérhetősége (e-mail cím). ↓(Csak akkor kell megadni, ha a külön NAV kapcsolódási adatok lekérdezésénél nem kérdeztük le.)

parameter12=INVOICE_APPEARANCE - ⚠ A számla típusa: ● PAPER - papír alapú (alapértelmezett) ● ELECTRONIC - elektronikus ● EDI - edi alapú ● UNKNOWN - egyéb
parameter13=INVOICE_NUMBER - ⚠ A számla sorszáma
parameter14=ISSUE_DATE - ⚠ A számla kelte
parameter15=DELIVERY_DATE - ⚠ Teljesítés/szállítás dátum
parameter16=PAYMENT_DATE - ⚠ Fizetési határidő
parameter17=PAYMENT_METHOD - ⚠ Fizetés módja: ● CASH - készpénz ● TRANSFER - átutalás ● CARD - bankkártya ● VOUCHER - utalvány ● OTHER - minden más egyéb ● Megadható ezektől eltérő fizetési mód is, ebben az esetben OTHER
parameter18=CURRENCY_CODE - ⚠ Pénznem 3 betűs kódja (alapértelmezett: HUF)
parameter19=EXCHANGE_RATE - ⚠ A HUF és más pénznem közötti váltószám (2 tizedesjegy pontossággal), értéke HUF esetén 1 (alapértelmezett)
parameter20=INVOICE_INVALIDATOR - ⚠ ● 1/true ha érvénytelenítő (storno) számla ● 0/false/null ha nem
parameter21=INVOICE_CORRECTIVE - ⚠ ● 1/true ha helyesbítő számla ● 0/false/null ha nem
parameter22=INVOICE_AGGREGATE - ● 1/true ha gyűjtőszámla ● 0/false/null ha nem
parameter23=ORIGINAL_INVOICE_NUMBER - ⚠ ha érvénytelenítő, vagy helyesbítő, akkor az első eredeti számla sorszáma, ha nem, akkor üresen kell hagyni
parameter24=MODIFICATION_INDEX - ⚠ Ha helyesbítő, akkor ez hányadik módosítása az eredeti számlának
parameter25=MODIFY_WITHOUT_MASTER - ● 1/true ha érvénytelenítő (storno), vagy helyesbítő, de nem tudunk eredeti számla sorszámot megadni ● 0/false/null normál esetben
parameter26=OWN_TAXNUMBER - ⚠ A saját adószám első 8 számjegye, megadható a teljes adószám is, ebben az esetben is a jelentés csak az első nyolcat használja fel.
parameter27=OWN_NAME - ⚠ saját cégnév
parameter28=OWN_COUNTRY_CODE - ⚠ országkód (alapértelmezett: HU)
parameter29=OWN_POSTAL_CODE - ⚠ irányítószám
parameter30=OWN_CITY - ⚠ helység, város
parameter31=OWN_ADDRESS - ⚠ A többi cím adat (utca, házszám, stb.), összevonva.
parameter32=OWN_BANK_ACCOUNT - A számlán is feltüntetett saját bankszámlaszám.
parameter33=OWN_INDIVIDUAL_EXEMPTION - ⚠ ● 1/true ha alanyi áfamentes magánvállalkozó ● egyébként 0/false/null na normál adózó.
parameter34=OWN_SMALL_BUSINESS - ⚠ ● 1/true ha kisadózó ● 0/false ha nem
parameter35=LAST_ITEM_LINE_NUMBER - ⚠ Az utolsó tétel sorszám: ha érvénytelenítő, vagy módosító számla, akkor az utolsó tétel sorszám (összeszámolva az eredeti és a korábbi módosító számlák tételeinek számát), egyéb esetben maradhat üres
parameter36=PARTNER_TAXNUMBER - ⚠ a vevő adószámának első 8 számjegye
parameter37=PARTNER_EU_TAXNUMBER - ⚠ a partner EU közösségi adószáma, ha van
parameter38=PARTNER_PRIVATE_PERSON - ⚠ ● 1/true, ha a vevő magánszemély ● 0/false/null ha vállalkozás
parameter39=PARTNER_NAME - ⚠ a vevő cég neve
parameter40=PARTNER_COUNTRY_CODE - ⚠ a vevő cég országkódja (alapértelmezett: HU)
parameter41=PARTNER_POSTAL_CODE - ⚠ a vevő irányítószáma
parameter42=PARTNER_CITY - ⚠ a vevő helységneve, városa
parameter43=PARTNER_ADDRESS - ⚠ a vevő többi cím adata
parameter44=NET_TOTAL - ⚠ a számla teljes nettó összege
parameter45=NET_TOTAL_HUF - ⚠ a számla teljes nettó összege HUF-ban
parameter46=VAT_TOTAL - ⚠ a számla teljes áfa összege
parameter47=VAT_TOTAL_HUF - ⚠ a számla teljes áfa összege HUF-ban
parameter48=GROSS_TOTAL - ⚠ a számla teljes bruttó összege
parameter49=GROSS_TOTAL_HUF - ⚠ a számla teljes bruttó összege HUF-ban
parameter50=TRANSACTION_ID - ⚠ Ha a számla korábban már jelentve lett, akkor a NAV-tól kapott tranzakciós ID-je (az ellenőrzéshez szükséges).


[QUERY4]
header_text=A számla tételeinek adatai
info_text=⚠ A jelentendő számla tételeinek lekérdezése. Fejléc ID paraméternek a :HEADER_ID-t kell megadni (pl.: invoice_header_id=:HEADER_ID). A számla tétel ID adatokat a rendszer az ITEM_ID mezőben várja (pl.: is AS ITEM_ID).
query_filename=query_invoice_items_list.sql

parameter1=:HEADER_ID - ⚠ a fejléc ID paraméter megadása, a számlák listájából jön.
parameter2=ITEM_ID - ⚠ a tétel ID (primary key), a tételhez kapcsolódó egyéb lekérdezésekhez szükséges (termékkódok, termékdíjak).

parameter3=ADVANCE_ITEM - Előlegtétel?: ● 1/true ha a tétel előlegtétel ● 0/false vagy üres ha normál tétel
parameter4=ADVANCE_FINAL_ITEM - Végszámla tétel?: ● 1/true ha a tétel előleghez kapcsolódó végszámla tétel (az előleget lemínuszoló) ● 0/false vagy üres ha normál tétel
parameter5=ORIGINAL_INVOICE_NUMBER - Ha ez előleg végszámla tétel, akkor az eredeti előlegtétel számlájának sorszáma
parameter6=ORIGINAL_PAYMENT_DATE - Ha ez előleg végszámla tétel, akkor az eredeti előlegtétel számlájának fizetési határideje
parameter7=ORIGINAL_EXCHANGE_RATE - Ha ez előleg végszámla, vagy gyűjtő tétel, akkor az eredeti számla árfolyam váltószáma, üresen hagyva az aktuális számla árfolyamát veszi alapul
parameter8=ORIGINAL_DELIVERY_DATE - Ha ez gyűjtő tétel, akkor az eredeti tétel (például szállítólevélről) teljesítési/szállítási dátuma
parameter9=ORIGINAL_DELIVERY_NOTE - Ha ez gyűjtő tétel, akkor az eredeti szállítólevél sorszáma

parameter10=LINE_NUMBER - ⚠ A tétel sorszáma a bizonylaton belül (1..n). Kötelező.
parameter11=LINE_NUMBER_REFERENCE - Ha ez érvénytelenítő, vagy módosító számla, akkor sorszám hivatkozás az eredeti tételre. Ha nincs megadva, akkor a fejléc lekérdezésben kell a LAST_ITEM_LINE_NUMBER paramétert megadni és innen sorszámoz automatikusan CREATE LineOperation beállítással).
parameter12=LINE_OPERATION - A tétel jelentésének jellege. Üresen hagyható, ekkor alapértelmezetten CREATE lesz. Értéke: ● CREATE - sorfolytonosan a következő tétel sorszámra mutat. ● MODIFY - az ellentételezett korábbi tétel sorszámára mutat.

parameter13=PRODUCT_NATURE - A termék természete: ● PRODUCT - árucikk, ● SERVICE - szolgáltatás, ● OTHER - egyéb, a másik kettőbe nem sorolható

parameter14=ITEM_DESCRIPTION - ⚠ A termék/szolgáltatás megnevezése.

parameter15=PRODUCT_VTSZ - Vámtarifa szám VTSZ ↓(Ha itt meg van adva, akkor a termékkódok listájában már ne szerepeljen.)
parameter16=PRODUCT_SZJ - Szolgáltatás jegyzék szám SZJ ↓(Ha itt meg van adva, akkor a termékkódok listájában már ne szerepeljen.)
parameter17=PRODUCT_TESZOR - Termékek és szolgáltatások osztályozási rendszerében megadott szám. ↓(Ha itt meg van adva, akkor a termékkódok listájában már ne szerepeljen.)
parameter18=PRODUCT_KN - KN kód (Kombinált Nómenklatúra, 2658/87/EGK rendelet I. melléklete). ↓(Ha itt meg van adva, akkor a termékkódok listájában már ne szerepeljen.)
parameter19=PRODUCT_AHK - A Jövedéki törvény (2016. évi LXVIII. tv) szerinti e-TKO adminisztratív hivatkozási kódja. ↓(Ha itt meg van adva, akkor a termékkódok listájában már ne szerepeljen.)
parameter20=PRODUCT_OWN - Valamilyen saját kód, például lehet a cikkszám. ↓(Ha itt meg van adva, akkor a termékkódok listájában már ne szerepeljen.)
parameter21=PRODUCT_OTHER - Valamilyen egyéb kód, például lehet a gyári szám. ↓(Ha itt meg van adva, akkor a termékkódok listájában már ne szerepeljen.)

parameter22=ITEM_QUANTITY - ⚠ A tételen szerepelő termék/szolgáltatás mennyisége.

parameter23=UNIT_OF_MEASURE - ⚠ A tételen szerepelő termék/szolgáltatás mennyiségi egysége. ● Értéke lehet a következő kulcsszavak egyike: PIECE, KILOGRAM, TON, KWH, DAY, HOUR, MINUTE, MONTH, LITER, METER, CUBIC_METER, LINEAR_METER, KILOMETER, CARTON, PACK ● Megadható ezektől eltérő, ekkor a rendszer egyediként jelenti (OWN paraméterrel).

parameter24=UNIT_PRICE - ⚠ A nettó egységár a számla pénznemében.
parameter25=UNIT_PRICE_HUF - ⚠ A nettó egységár forintban.

parameter26=DISCOUNT_DESCRIPTION - Ha van engedmény a tételen, akkor annak szövege. Elég egy 'Árengedmény' szöveg. Ha nincs engedmény, akkor üresen hagyható.
parameter27=DISCOUNT_VALUE - Ha van engedmény a tételen, annak nettó tétel értékéből (nettó egységár * mennyiség) levonandó összege. Ha nincs engedmény, akkor értéke 0, vagy üres.
parameter28=DISCOUNT_PERCENT - Ha van engedmény a tételen, annak százalékos értéke (pl.: 20). Ha nincs engedmény, akkor értéke 0, vagy üres.

parameter29=ITEM_NET_TOTAL - ⚠ A tétel összege (nettó egységár * mennyiség) a számla pénznemében (ha van engedmény, akkor már azzal csökkentett érték).
parameter30=ITEM_NET_TOTAL_HUF - ⚠ A tétel összege (nettó egységár * mennyiség) forintban (ha van engedmény, akkor már azzal csökkentett érték).

parameter31=VAT_CODE - ⚠ A tétel áfa kódja. Csak a következő kulcsszavak egyike lehet: NORMAL (pl.: a 27%-os esetén), AAM, TAM, KBAET, KBAUK, EAM, NAM, ATK, FAD, EUFAD37, EUFADE, EUE, HO, REFUNDABLE_VAT, NONREFUNDABLE_VAT, TRAVEL_AGENCY, SECOND_HAND, ARTWORK, ANTIQUES
parameter32=VAT_REASON - ⚠ Ha nem NORMAL az áfa, akkor meg kell adni az egyik rövid, hivatalos jogi hivatkozást. Ha nincs hivatalosan megadható hivatkozás az adott áfa esethez, akkor üresen hagyható.
parameter33=VAT_PERCENTAGE - ⚠ Az áfa százalék értéke: ● NORMAL esetén meg kell adni az áfa kulcsát (átadható egész számként, pl.: 27, vagy tört értékként, pl.: 0.27). ● Elvileg REFUNDABLE_VAT és NONREFUNDABLE_VAT esetén is megadható áfa százalék érték, de ennek kalkulációjára nem található példa. ● Minden egyéb esetben 0 érték.

parameter34=ITEM_VAT_AMOUNT - ⚠ A tétel áfa összege a számla pénznemében ↓(a ITEM_NET_TOTAL-ra számolandó áfa érték).
parameter35=ITEM_VAT_AMOUNT_HUF - ⚠ A tétel áfa összege forintban ↓(a ITEM_NET_TOTAL_HUF-ra számolandó áfa érték).

parameter36=ITEM_GROSS_TOTAL - ⚠ A tétel bruttó összege a számla pénznemében ↓( ITEM_NET_TOTAL + ITEM_VAT_AMOUNT ).
parameter37=ITEM_GROSS_TOTAL_HUF - ⚠ A tétel bruttó összege forintban ↓( ITEM_NET_TOTAL_HUF + ITEM_VAT_AMOUNT_HUF ).


[QUERY5]
header_text=Tétel termékkódok listája
info_text=Ha a tétel lekérdezésben nem adtuk meg a termékhez tartozó kódokat (PRODUCT_VTSZ, PRODUCT_SZJ, stb.), akkor azok itt kérdezhetőek le. Ha a tétel lekérdezésben adtunk meg termékkódokat, de vannak továbbiak is, akkor azok is itt kérdezhetők le.
query_filename=query_invoice_item_product_codes.sql
parameter1=:ITEM_ID - ⚠ Ez a paraméter jelzi, hogy melyik tételhez tartozó termékkódokat kérdezzük le
parameter2=PRODUCT_CODE_CATEGORY - ⚠ A termékkód kategóriája, csak a következő kulcsszavak egyike lehet: VTSZ, SZJ, KN, AHK, CSK, KT, EJ, TESZOR, OWN, OTHER
parameter3=PRODUCT_CODE_VALUE - ⚠ A kód: ● Például VTSZ esetén a hivatalos vámtarifaszám, SZJ esetén a szolgáltatásjegyzék szám, stb. ● OWN és OTHER esetén bármilyen saját kód lehet, például cikkszám, vonalkód, vagy gyártási szám.


[QUERY6]
header_text=Tétel termékdíjak listája
info_text=Ha a terméken termékdíjak vannak, akkor itt kérdezhetőek le.
query_filename=query_invoice_item_fee_codes.sql
parameter1=:ITEM_ID - ⚠ A tétel ID paramétere.
parameter2=FEE_CODE - ⚠ A termékdíj kategória, értéke: KT, vagy CSK. 
parameter3=FEE_CODE_VALUE - ⚠ A termékdíj kód értéke (például 4MA, stb.).
parameter4=FEE_QUANTITY - ⚠ A termékdíjjal érintett termék mennyiség.
parameter5=FEE_MEASURING_UNIT - ⚠ A termékdíj mennyiségi egysége. ● Értéke lehet a következő kulcsszavak egyike: PIECE, KILOGRAM, TON, KWH, DAY, HOUR, MINUTE, MONTH, LITER, KILOMETER, CUBIC_METER, METER, LINEAR_METER, CARTON, PACK ● Megadható ezektől eltérő, ekkor a rendszer egyediként jelenti (OWN paraméterrel).
parameter6=FEE_RATE - ⚠ A termékdíj díjtétele (HUF/egység).
parameter7=FEE_AMOUNT - ⚠ Termékdíj összege ( FEE_QUANTITY * FEE_RATE ) forintban.					


[QUERY7]
header_text=Számla áfa összesítő lista
info_text=⚠ A számla áfa típusait kell itt lekérdezni, típusonként összesítve a tétel összegeket.
query_filename=query_invoice_vat_summary.sql
parameter1=:HEADER_ID - ⚠ A számla ID paraméter.
parameter2=VAT_CODE - ⚠ Az áfa típus kódja. Csak a következő kulcsszavak egyike lehet: NORMAL (pl.: a 27%-os esetén), AAM, TAM, KBAET, KBAUK, EAM, NAM, ATK, FAD, EUFAD37, EUFADE, EUE, HO, REFUNDABLE_VAT, NONREFUNDABLE_VAT, TRAVEL_AGENCY, SECOND_HAND, ARTWORK, ANTIQUES
parameter3=VAT_REASON - ⚠ Ha nem NORMAL az áfa, akkor meg kell adni az egyik rövid, hivatalos jogi hivatkozást. Ha nincs hivatalosan megadható hivatkozás az adott áfa esethez, akkor üresen hagyható.
parameter4=VAT_PERCENTAGE - ⚠ Az áfa százalék értéke: ● NORMAL esetén meg kell adni az áfa kulcsát (átadható egész számként, pl.: 27, vagy tört értékként, pl.: 0.27). ● Elvileg REFUNDABLE_VAT és NONREFUNDABLE_VAT esetén is megadható áfa százalék érték, de ennek kalkulációjára nem található példa. ● Minden egyéb esetben 0 érték.
parameter5=VAT_NET_TOTAL - ⚠ Az áfa típus nettó összesítése a számla pénznemében (ha van engedmény, akkor már azzal csökkentett érték).
parameter6=VAT_NET_TOTAL_HUF - ⚠ Az áfa típus nettó összesítése forintban (ha van engedmény, akkor már azzal csökkentett érték).
parameter7=VAT_AMOUNT - ⚠ Az áfa típus áfa érték összesítése a számla pénznemében ↓(a ITEM_NET_TOTAL-ra számolandó áfa érték).
parameter8=VAT_AMOUNT_HUF - ⚠ Az áfa típus áfa érték összesítése forintban ↓(a ITEM_NET_TOTAL_HUF-ra számolandó áfa érték).
parameter9=VAT_GROSS_TOTAL - ⚠ Az áfa típus bruttó összesítése a számla pénznemében ↓( ITEM_NET_TOTAL + ITEM_VAT_AMOUNT ).
parameter10=VAT_GROSS_TOTAL_HUF - ⚠ Az áfa típus bruttó összesítése forintban ↓( ITEM_NET_TOTAL_HUF + ITEM_VAT_AMOUNT_HUF ).



[QUERY8]
header_text=Számla termékdíj összesítő lista
info_text=A számla termékdíj típusait kell itt lekérdezni, típusonként összesítve a tétel összegeket.
query_filename=query_invoice_product_fee_summary.sql
parameter1=:HEADER_ID - A tétel ID paramétere.
parameter2=FEE_CODE - A termékdíj kategória, értéke: KT, vagy CSK. 
parameter3=FEE_CODE_VALUE - A termékdíj kód értéke (például 4MA, stb.).
parameter4=FEE_QUANTITY - A termékdíjjal érintett termék mennyiség.
parameter5=FEE_MEASURING_UNIT - A termékdíj mennyiségi egysége. ● Értéke lehet a következő kulcsszavak egyike: PIECE, KILOGRAM, TON, KWH, DAY, HOUR, MINUTE, MONTH, LITER, KILOMETER, CUBIC_METER, METER, LINEAR_METER, CARTON, PACK ● Megadható ezektől eltérő, ekkor a rendszer egyediként jelenti (OWN paraméterrel).
parameter6=FEE_RATE - A termékdíj díjtétele (HUF/egység).
parameter7=FEE_AMOUNT - Termékdíj összege ( FEE_QUANTITY * FEE_RATE ) forintban.


[QUERY9]
header_text=Ellenőrizendő számlák listája
info_text=⚠ A már jelentett, ellenőrizendő státuszú számlákat kérdezi le. Mivel a számla jelentésének teljesítéséhez tudni kell, hogy a NAV befogadta-e a számlákat, ezért szükséges az ellenőrzés. Elegendő a HERDER_ID mezőben visszakapni az ellenőrizendő számlák ID adatát.
query_filename=query_invoice_list_to_check.sql
parameter1=HEADER_ID - ⚠ Számla fejléc ID mező
parameter5=TRANSACTION_ID - ⚠ A jelentett számlához kapott szám, ezzel lehet ellenőrizni a számla státuszát.


[QUERY10]
header_text=A jelentés eredményeinek mentése
info_text=⚠ Ezzel a lekérdezéssel mentjük az adatbázisba (a számla fejléc rekordba, vagy ha máshol vannak tárolva a jelentés státuszok, akkor oda) a számla jelentés státuszok lekérdezésének eredményét. Ebben a lekérdezésben csak paraméterek adandók meg.
query_filename=query_invoice_check_results.sql
parameter1=:HEADER_ID - ⚠ A számla ID paraméter.
parameter2=:INVOICE_REPORTED - ⚠ Ha a számla feladása a NAV felé sikerült, akkor TRUE értéket ad, ha sikertelen, akkor FALSE értéket.
parameter3=:INVOICE_REPORT_COMPLETED - ⚠ Ha egy már jelentett számla státusz ellenőrzésekor azt az eredményt kapjuk, hogy a NAV befogadta a számlát, akkor TRUE érték mentődik, ha nem sikeres, akkor FALSE érték.
parameter4=:INVOICE_REPORT_ERROR - True, ha sikertelen a számla jelentése.
parameter5=:INVOICE_REPORT_ERROR_TEXT - Ha sikertelen a számla jelentése, akkor ebben a szöveges paraméterben kapjuk vissza azoknak a hibáknak a leírását, amelyek miatt nem sikerült a jelentés.
parameter6=:INVOICE_REPORT_STATUS - A jelentés ellenőrzésekor visszakapott státuszkód. Értéke lehet: ● OK: A számla jelentése sikerült (de még nincs leellenőrizve) ● RECEIVED: A számla jelentve, de a NAV rendszere még nem kezelte. ● PROCESSING: A NAV rendszere éppen feldolgozza a jelentett számlát. ● ABORTED: A számla jelentést a NAV elutasította valamilyen hiba miatt (a számla elvileg újra jelenthető). ● DONE: A jelentett számlát a NAV rendszere megfelelőnek találta és befogadta, ezzel teljesült a számla jelentés.
parameter7=:TRANSACTION_ID - ⚠ A jelentett számlához visszaad a NAV egy tranzakciós számot, ezzel lehet ellenőrizni a számla státuszát.
