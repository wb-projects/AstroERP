[QUERY]
select=SELECT arucsop_view.id, arucsop_view.parent_id, arucsop_view.rootid, arucsop_view.level, arucsop_view.idlist, arucsop_view.namelist, arucsop_view.jelolo_szin AS jelolo_szin, arucsop_view.arucsop_tipus, arucsop_view.tipus,
from=FROM arucsop_view LEFT OUTER JOIN afa ON afa.id=arucsop_view.afa_id 
where=WHERE arucsop_view.id<>0 
maintablename=arucsop
longcaption=TermÈk csoportok
longcaption_en=Product Groups
shortcaption=TermÈk csoportok
shortcaption_en=Product Groups
coloredfield=focsop_dot_arucsop_nev
defaultgroupbyfields=
subtotals=0
defaultorderbyfields=

[FIELD0]
expression=arucsop_view.megnevezes  
fieldname=arucsop_nev
titlecaption=Csoport megnevezÈs
titlecaption_en=Group Name
width=500
visible=1
aggregate=2
datatype=varchar

[FIELD1]
expression=(SELECT Elt(:LangISO+1,name_hun,name_eng,name_ger,name_fra,name_jap) FROM product_type WHERE code=arucsop_view.tipus LIMIT 1)   
fieldname=arucsop_jelleg
titlecaption=TÌpus
titlecaption_en=Type
width=80
visible=1
aggregate=0
datatype=varchar

[FIELD2]
expression=afa.megnevezes  
fieldname=afanev
titlecaption=¡FA
titlecaption_en=VAT
width=101
visible=1
aggregate=3
