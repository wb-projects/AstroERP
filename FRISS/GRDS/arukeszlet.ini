[QUERY]
select=SELECT arukeszlet.id, arukeszlet.raktar_id,
from=FROM arukeszlet  LEFT OUTER JOIN arutorzs ON arutorzs.id=arukeszlet.arutorzs_id  LEFT OUTER JOIN arucsop ON arucsop.id=arutorzs.arucsop_id  LEFT OUTER JOIN afa ON afa.id=arutorzs.afa_id  LEFT OUTER JOIN raktar ON raktar.id=arukeszlet.raktar_id  LEFT OUTER JOIN tarhely ON tarhely.id=arukeszlet.tarhely_id 
where=WHERE arukeszlet.kod<>0 
maintablename=arukeszlet
longcaption=Ńrukťszlet
longcaption_en=Product Stock
shortcaption=Ńrukťszlet
shortcaption_en=Product Stock
coloredfield=
defaultgroupbyfields=teljes_megnevezes
subtotals=1
defaultorderbyfields=teljes_megnevezes, egyedi_tulajdonsagok, sarzs_azonosito

