[QUERY]
select=SELECT biz_item.id biid, biz_header.id, vkod, biz_header.biz_modul_kod, biz_header.teljesitve, biz_header.hatarido, biz_header.storno, biz_header.stornozott, biz_header.helyesbito, biz_header.helyesbitett, biz_header.lezarva, biz_header_ext.kifizetve, biz_header.tag, biz_item.arutorzs_id, biz_header.munkatars_id, 
from=FROM biz_header  LEFT OUTER JOIN biz_header_ext ON biz_header_ext.biz_header_id=biz_header.id  LEFT OUTER JOIN biz_item ON biz_item.biz_header_id=biz_header.id  LEFT OUTER JOIN biz_item_ext ON biz_item_ext.biz_item_id=biz_item.id  LEFT OUTER JOIN arutorzs ON arutorzs.id=biz_item.arutorzs_id  LEFT OUTER JOIN arkategoriak ON arkategoriak.arutorzs_id=arutorzs.id  LEFT OUTER JOIN afa ON afa.id=arutorzs.afa_id  LEFT OUTER JOIN raktar ON raktar.id=biz_item.raktar_id  LEFT OUTER JOIN arucsop ON arucsop.id=arutorzs.arucsop_id
where= WHERE 1=1 
maintablename=biz_header
longcaption=Értékesítés - Számlák
longcaption_en=Sales - Invoices
shortcaption=Vevői számlák
shortcaption_en=Sales - Invoices
coloredfield=sorszam
defaultgroupbyfields=sorszam
subtotals=1
defaultorderbyfields=kelte desc, sorszam desc

