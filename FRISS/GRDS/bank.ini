[QUERY]
select=SELECT PM.id, PM.tipus, PM.penztar_id, PM.bankszamla_id,
from=FROM penzmozgasok PM  LEFT OUTER JOIN pmozgasnemek PN ON PM.pmozgasnem_id=PN.id  LEFT OUTER JOIN penztar PE ON PM.penztar_id=PE.id  LEFT OUTER JOIN bankszamla B1 ON PM.bankszamla_id=B1.id  LEFT OUTER JOIN munkatarsak M1 ON PM.munkatars_id=M1.id  LEFT OUTER JOIN partner PAR ON PAR.id=PM.partner_id  LEFT OUTER JOIN munkatarsak M2 ON PM.partner_munkatars_id=M2.id  LEFT OUTER JOIN bankszamla B2 ON PM.partner_bankszamla_id=B2.id  LEFT OUTER JOIN biz_header BH ON BH.id=PM.bizonylat_header_id 
where=WHERE 1=1 
maintablename=penzmozgasok
longcaption=Bankok
longcaption_en=Banks
shortcaption=Bankok
shortcaption_en=Banks
coloredfield=sorszam
defaultgroupbyfields=pm_sorszam
subtotals=0
defaultorderbyfields=pm_kelte desc, pm_sorszam

[FIELD0]
expression=PM.sorszam  
fieldname=pm_sorszam
titlecaption=Sorszám
titlecaption_en=number
width=150
visible=1
aggregate=2
datatype=varchar

[FIELD1]
expression=PM.kelte
fieldname=pm_kelte
titlecaption=Kelte
titlecaption_en=Date
width=70
visible=1
aggregate=5
datatype=date

[FIELD2]
expression=PM.teljesites
fieldname=pm_teljesites
titlecaption=Teljesítés
titlecaption_en=Compliance
width=70
visible=1
aggregate=5
datatype=date

[FIELD3]
expression=M1.nev  
fieldname=rogzitette
titlecaption=Rögzítette
titlecaption_en=fixed
width=200
visible=1
aggregate=0
datatype=varchar

[FIELD4]
expression=PE.penztarnev  
fieldname=pm_penztarnev
titlecaption=Pénztárnév
