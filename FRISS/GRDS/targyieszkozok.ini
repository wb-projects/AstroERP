[QUERY]
select=SELECT targyieszkozok.id, 
from=FROM targyieszkozok  LEFT OUTER JOIN arutorzs ON arutorzs.id=targyieszkozok.arutorzs_id  LEFT OUTER JOIN koltseghelyek ON koltseghelyek.id=targyieszkozok.koltseghely_id  LEFT OUTER JOIN raktar ON raktar.id=targyieszkozok.raktar_id 
where= WHERE 1=1 
maintablename=targyieszkozok
longcaption=Tárgyi eszközök
longcaption_en=Fixed assets
shortcaption=Tárgyi eszközök
shortcaption_en=Fixed assets
coloredfield=
defaultgroupbyfields=
subtotals=0
defaultorderbyfields=id

[FIELD0]
expression=arutorzs.teljes_megnevezes
fieldname=teljes_megnevezes
titlecaption=Áru megnevezése
titlecaption_en=Name of goods
width=309
visible=1
aggregate=0
datatype=varchar

[FIELD1]
expression=koltseghelyek.megnevezes  
fieldname=ktghely
titlecaption=Költséghely
titlecaption_en=cost Center
width=107
visible=1
aggregate=0
datatype=varchar

[FIELD2]
expression=(select megnevezes from telephely where id=targyieszkozok.telephely_id) 
fieldname=telephely_megnevezes
titlecaption=Telephely
titlecaption_en=Site
width=117
visible=1
aggregate=0
datatype=varchar

