[QUERY]
select=SELECT arutorzs.id, arutorzs.main_picture_filename, arutorzs.alap_beszallito_id, arutorzs.arucsop_id, arutorzs.megszunt,
from=FROM arutorzs LEFT OUTER JOIN arucsop ON arucsop.id=arutorzs.arucsop_id  LEFT OUTER JOIN afa ON afa.id=arutorzs.afa_id  LEFT OUTER JOIN arkategoriak ON arkategoriak.arutorzs_id=arutorzs.id LEFT OUTER JOIN partner SUPP ON SUPP.id=arutorzs.alap_beszallito_id 
where=WHERE arutorzs.id<>0 
maintablename=arutorzs
longcaption=Termék törzsadatok
longcaption_en=Product Master Data
shortcaption=Termék törzsadatok
shortcaption_en=Product Master Data
coloredfield=kod
defaultgroupbyfields=
subtotals=0
defaultorderbyfields=kod desc
superfetch=1
titlecaptionquery=SELECT * FROM arkategoriak WHERE torzsadat=1

