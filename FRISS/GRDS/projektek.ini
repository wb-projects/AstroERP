[QUERY]
select=SELECT esemenyek.id,
from=FROM esemenyek LEFT OUTER JOIN munkatarsak ON munkatarsak.id=esemenyek.munkatars_id  LEFT OUTER JOIN partner ON partner.id=esemenyek.partner_id 
where=WHERE esemenyek.event_type_code='PRJ' 
maintablename=esemenyek
longcaption=Projektek
longcaption_en=projects
shortcaption=Projektek
shortcaption_en=projects
coloredfield=
defaultgroupbyfields=
subtotals=0
defaultorderbyfields=kezdete

