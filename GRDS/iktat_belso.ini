[QUERY]
select=SELECT docs.id, docs.tipus,
from=FROM docs  LEFT OUTER JOIN partner ON partner.id=docs.partner_id  LEFT OUTER JOIN munkatarsak m1 ON m1.id=docs.munkatars1_id  LEFT OUTER JOIN munkatarsak m22 ON m22.id=docs.munkatars2_id 
where= WHERE docs.iktatasi_szam Is Not Null AND (docs.tipus='I' OR docs.tipus is null) 
maintablename=docs
longcaption=Iktatás - Belső
longcaption_en=Recording - Inside
shortcaption=Iktatás - Belső
shortcaption_en=Recording - Inside
coloredfield=
defaultgroupbyfields=
subtotals=0
defaultorderbyfields=id

