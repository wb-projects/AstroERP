[QUERY]
select=SELECT fk_header.id,
from=FROM fk_header  LEFT OUTER JOIN fk_naplo ON fk_naplo.id=fk_header.naplo_id  LEFT OUTER JOIN partner ON partner.id=fk_header.partner_id 
where= WHERE 1=1  
maintablename=fk_header
longcaption=Könyvelés
longcaption_en=Booking
shortcaption=Könyvelés
shortcaption_en=Booking
coloredfield=sorszam
defaultgroupbyfields=sorszam
subtotals=0
defaultorderbyfields=sorszam

