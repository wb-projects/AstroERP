SQLquery1="SELECT * FROM biz_settings WHERE kod=1301"
SQLquery2="SELECT biz_header.*, biz_header_ext.*,  (Select If(egyeni_vallalkozo=1,ev_nyilv_tart_szam,ceg_engszam) From settings Limit 1) as eng_nyilv_szam,  (Select cim From telephely Where id=biz_header.telephely_id) as telephely_cim,  (Select telfax From telephely Where id=biz_header.telephely_id) as telephely_tel,  (Select email From partner Where id=biz_header.partner_id) as partner_email,  (Select GROUP_CONCAT(DISTINCT BIE.source_item_header_serial ORDER BY BI.id DESC SEPARATOR ', ')   From biz_item BI, biz_item_ext BIE Where BI.id=BIE.biz_item_id And BI.biz_header_id=biz_header.id   And BIE.source_item_header_serial is not null) as items_source_biz_list  FROM biz_header, biz_header_ext   WHERE biz_header_ext.biz_header_id=biz_header.id AND biz_header.id='23300'  "
SQLquery3="SELECT    'ITEM' as itipus, biz_item.id, extra_megjegyzes, megnevezes, megjegyzes, ktdij_text, afa_text, (select vtsz from arutorzs where id=biz_item.arutorzs_id) as vtsz,    mennyiseg, egyseg, egysegar, engedmeny,    ossz_netto_alap as ertek_netto,    afakulcs as afa, afanev as afa_nev,    ossz_afa_alap as afa_osszeg,    ossz_brutto_alap as ertek_brutto,    band,    egysegar_eng as e_egysegar,    ossz_netto_eng as e_ertek_netto,    ossz_afa_eng as e_afa_osszeg,    ossz_brutto_eng as e_ertek_brutto,    egysegar_csk as c_egysegar,    ossz_netto as c_ertek_netto,    ossz_afa as c_afa_osszeg,    ossz_brutto as c_ertek_brutto    FROM biz_item, biz_item_ext    WHERE biz_item_ext.biz_item_id=biz_item.id AND biz_header_id='23300'      UNION      SELECT DISTINCT    'AFA', 0, '-', IF(LENGTH(afa.megnevezes)<4,'',CONCAT(afa.megnevezes,':')), '-', '', '', '',    '-', '-', '-', 0,    sum(ossz_netto) as ertek_netto,    afakulcs as afa, afanev as afa_nev,    sum(ossz_afa) as afa_osszeg,    sum(ossz_brutto) as ertek_brutto,    band,    '-' as e_egysegar,    '-' as e_ertek_netto,    '-' as e_afa_osszeg,	    '-' as e_ertek_brutto,    '-' as c_egysegar,    '-' as c_ertek_netto,    '-' as c_afa_osszeg,    '-' as c_ertek_brutto    FROM biz_item, biz_item_ext, afa    WHERE biz_item_ext.biz_item_id=biz_item.id AND afa.id=afa_id AND biz_header_id='23300'    GROUP BY band, afa_id      UNION      SELECT DISTINCT    'SUM', 0, '-', '-', '-', '', '', '',    '-', '-', '-', 0,    sum(ossz_netto) as ertek_netto,    '-', '-',    sum(ossz_afa) as afa_osszeg,    sum(ossz_brutto) as ertek_brutto,    band,    '-' as e_egysegar,    '-' as e_ertek_netto,    '-' as e_afa_osszeg,    '-' as e_ertek_brutto,    '-' as c_egysegar,    '-' as c_ertek_netto,    '-' as c_afa_osszeg,    '-' as c_ertek_brutto    FROM biz_item, biz_item_ext    WHERE biz_item_ext.biz_item_id=biz_item.id AND biz_header_id='23300'    GROUP BY band        ORDER BY ifnull(band,''), FIELD(itipus,'ITEM','AFA','SUM'), id  "
SQLquery4="SELECT DISTINCT   afa_id,   afakulcs as afa,   afanev as afa_nev,   afa_text,   sum(ossz_netto) as a_ertek_netto,    sum(ossz_brutto) as a_ertek_brutto,   sum(ossz_afa) as a_afa_osszeg  FROM biz_item, biz_item_ext   WHERE biz_item_ext.biz_item_id=biz_item.id AND biz_header_id='23300'   GROUP BY afa_id"
SQLquery5="SELECT   ossz_netto as ossz_ertek_netto,  ossz_afa as ossz_afa_osszeg,  ossz_brutto as ossz_ertek_brutto,  Floor(ossz_brutto) as devizahigh,  Substring( (ossz_brutto mod 1), 3,4 ) as devizalow  FROM biz_header_ext   WHERE biz_header_id='23300'"
SQLquery6="SELECT DISTINCT  afa_id,   afakulcs as afa,  afanev as afa_nev,  afa_text,  sum(ossz_netto_ft) as a_ertek_netto,  sum(ossz_afa_ft) as a_afa_osszeg,  sum(ossz_brutto_ft) as a_ertek_brutto  FROM biz_item, biz_item_ext  WHERE biz_item_ext.biz_item_id=biz_item.id AND biz_header_id='23300'  GROUP BY afa_id"
SQLquery7="SELECT  ossz_netto_ft as ossz_ertek_netto,  ossz_brutto_ft as ossz_ertek_brutto,  ossz_afa_ft as ossz_afa_osszeg  FROM biz_header_ext WHERE biz_header_id='23300'"
