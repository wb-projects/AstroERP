[QUERY]
select=SELECT docs.id, docs.tipus,
from=FROM docs  LEFT OUTER JOIN partner ON partner.id=docs.partner_id  LEFT OUTER JOIN munkatarsak m1 ON m1.id=docs.munkatars1_id  LEFT OUTER JOIN munkatarsak m2 ON m2.id=docs.munkatars2_id 
