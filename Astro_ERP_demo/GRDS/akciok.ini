[FIELD7]
expression=CASE  WHEN Date(vege)<Date(NOW()) THEN 'LEZÁRULT'  WHEN Date(kezdete)<Date(NOW()) AND Date(NOW())<Date(vege) THEN 'AKTUÁLIS'  WHEN Date(NOW())<Date(kezdete) THEN 'TERVEZETT'  ELSE '-'  END statusz
fieldname=statusz
titlecaption=Státusz
titlecaption_en=Status
width=107
visible=1
aggregate=0
datatype=varchar

[FIELD8]
