[QUERY]
select=SELECT akciok.id,
from=FROM akciok  LEFT OUTER JOIN arutorzs ON arutorzs.id=akciok.arutorzs_id  LEFT OUTER JOIN arucsop ON arucsop.id=akciok.arucsop_id  LEFT OUTER JOIN raktar ON raktar.id=akciok.raktar_id
where=WHERE 1=1 
maintablename=akciok
longcaption=Akciók
longcaption_en=Price Discounts
shortcaption=Akciók
shortcaption_en=Price Discounts
coloredfield=kezdete
defaultgroupbyfields=
subtotals=0
defaultorderbyfields=kezdete

[FIELD0]
expression=akciok.kezdete  
fieldname=kezdete
titlecaption=Kezdete
titlecaption_en=Start date
width=71
visible=1
aggregate=4
datatype=date

[FIELD1]
expression=akciok.vege  
fieldname=vege
titlecaption=Vége
titlecaption_en=End date
width=81
visible=1
aggregate=0
datatype=date

[FIELD2]
expression=if(akcio_tipus=0,'Termék',if(akcio_tipus=1,'Csoport','Raktár')) 
fieldname=akco_tipus
titlecaption=Akció típus
titlecaption_en=Discount type
width=65
visible=1
aggregate=2
datatype=varchar

