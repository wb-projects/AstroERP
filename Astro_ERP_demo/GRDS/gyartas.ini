[QUERY]
select=SELECT gyartas.id,
from=FROM gyartas LEFT OUTER JOIN partner ON partner.id=gyartas.partner_id  LEFT OUTER JOIN munkatarsak ON munkatarsak.id=gyartas.munkatars_id  LEFT OUTER JOIN arutorzs ON arutorzs.id=gyartas.arutorzs_id  LEFT OUTER JOIN raktar FR ON FR.id=gyartas.forras_raktar_id  LEFT OUTER JOIN raktar CR ON CR.id=cel_raktar_id 
where=WHERE 1=1
groupby=
defaultorderbyfields=utemezett_datum desc, gyartas_datum desc

