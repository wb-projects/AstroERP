[QUERY]
select=SELECT arkatalogus.id, arkatalogus.jelolo_szin,
from=FROM arkatalogus LEFT OUTER JOIN arucsop ON arkatalogus.arucsop_id=arucsop.id  LEFT OUTER JOIN partner ON partner.id=arkatalogus.gyarto_id 
where=WHERE 1=1  
maintablename=arkatalogus
longcaption=Árkatalógus
longcaption_en=Price Catalog
shortcaption=Árkatalógus
shortcaption_en=Price Catalog
coloredfield=kod
defaultgroupbyfields=
subtotals=0
defaultorderbyfields=megnevezes

[FIELD0]
expression=arkatalogus.kod  
fieldname=kod
titlecaption=Katalóguskód
titlecaption_en=Catalog Code
width=100
visible=1
aggregate=0
datatype=integer

[FIELD1]
expression=arkatalogus.datum_tol  
fieldname=datum_tol
titlecaption=Dátum -tól
titlecaption_en=Date from
width=100
visible=1
aggregate=0
datatype=date

[FIELD2]
expression=arkatalogus.datum_ig  
fieldname=datum_ig
titlecaption=Dátum -ig
titlecaption_en=Until date
width=100
visible=1
aggregate=0
datatype=date

[FIELD3]
expression=arkatalogus.megnevezes  
fieldname=megnevezes
titlecaption=Katalógus megnevezése
titlecaption_en=Name of Catalog
width=722
visible=1
aggregate=0
datatype=varchar

[FIELD4]
expression=arucsop.megnevezes  
fieldname=arucsop_nev
titlecaption=Árucsoport
titlecaption_en=Product Group
width=250
visible=1
aggregate=0
datatype=varchar

[FIELD5]
