[QUERY]
select=SELECT partner.id,
from=FROM partner LEFT OUTER JOIN partner_ext ON partner_ext.partner_id=partner.id 
where=WHERE partner.kod<>'0' 
maintablename=partner
longcaption=Partnerek, CRM
longcaption_en=Partners, CRM
shortcaption=Partnerek, CRM
shortcaption_en=Partners, CRM
coloredfield=
defaultgroupbyfields=
subtotals=0
defaultorderbyfields=kod

[FIELD0]
expression=partner.kod  
fieldname=kod
titlecaption=Vevűkůd
titlecaption_en=Customer code
width=80
visible=1
aggregate=2
datatype=integer

[FIELD1]
expression=(select megnevezes from partnercsoport where partnercsoport.id=partner.partnercsoport_id) 
fieldname=partnercsoport_megnevezes
